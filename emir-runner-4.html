<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EMİR OYUNU</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--c1:#ff6a00;--c2:#ffd700;--c3:#ff2d55;--dark:#06070f;--card:#161830;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#06070f;font-family:'Rajdhani',sans-serif;}
canvas#c{display:block;position:fixed;inset:0;width:100%;height:100%;}

.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;pointer-events:all;}
.scr.off{display:none;}

/* MAIN MENU */
#sMain{background:radial-gradient(ellipse 120% 100% at 50% 110%,#1a0d2e 0%,#06070f 60%);}
#sMain::before{content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='40' cy='40' r='1.2' fill='rgba(255,106,0,0.18)'/%3E%3C/svg%3E") repeat;
  animation:bgdrift 30s linear infinite;}
@keyframes bgdrift{to{background-position:80px 80px;}}
.menuTitle{font-family:'Bebas Neue',cursive;font-size:clamp(56px,12vw,96px);
  background:linear-gradient(135deg,var(--c1),var(--c2),var(--c1));background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 3s linear infinite;letter-spacing:4px;line-height:1;position:relative;z-index:1;text-align:center;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%;}}
.menuSub{font-size:clamp(11px,2.5vw,16px);letter-spacing:8px;color:rgba(255,255,255,.35);
  text-transform:uppercase;margin:6px 0 48px;position:relative;z-index:1;}
.menuBtns{display:flex;flex-direction:column;gap:14px;width:min(320px,85vw);position:relative;z-index:1;}
.mBtn{position:relative;padding:16px 0;border:none;border-radius:14px;
  font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;overflow:hidden;}
.mBtn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);opacity:0;transition:.2s;}
.mBtn:hover::after,.mBtn:active::after{opacity:1;}
.mBtn:active{transform:scale(.97);}
.mBtn-play{background:linear-gradient(135deg,var(--c1),var(--c2));color:#000;box-shadow:0 8px 32px rgba(255,106,0,.45);}
.mBtn-shop{background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;box-shadow:0 8px 32px rgba(124,58,237,.35);}
.mBtn-about{background:rgba(255,255,255,.07);color:#fff;border:1.5px solid rgba(255,255,255,.18);}

/* ABOUT */
#sAbout{background:linear-gradient(160deg,#06070f,#0f0f22);}
.aboutCard{background:var(--card);border:1.5px solid rgba(255,255,255,.1);border-radius:24px;
  padding:36px 32px;width:min(380px,90vw);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.aboutTitle{font-family:'Bebas Neue',cursive;font-size:36px;color:var(--c2);letter-spacing:3px;margin-bottom:20px;}
.aboutRow{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);color:#ccc;font-size:15px;}
.aboutRow:last-of-type{border-bottom:none;}
.aboutRow span{color:#fff;font-weight:700;}
.backBtn{margin-top:28px;padding:13px 44px;border:none;border-radius:30px;
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
  color:#fff;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;cursor:pointer;transition:.15s;}
.backBtn:active{transform:scale(.97);background:rgba(255,255,255,.15);}

/* SHOP */
#sShop{background:linear-gradient(160deg,#06070f,#150820);overflow-y:auto;}
.shopHeader{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:460px;padding:0 4px;margin-bottom:20px;}
.shopTitle{font-family:'Bebas Neue',cursive;font-size:34px;color:var(--c2);letter-spacing:3px;}
.shopCoinsBox{display:flex;align-items:center;gap:7px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:7px 16px;color:#ffd700;font-size:17px;font-weight:700;}
.shopGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:460px;padding-bottom:20px;}
.sItem{background:var(--card);border:2px solid rgba(255,255,255,.08);border-radius:18px;padding:18px 12px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden;}
.sItem::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent);}
.sItem:active{transform:scale(.97);}
.sItem.owned{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.05);}
.sItem .sIco{display:flex;align-items:center;justify-content:center;height:46px;margin-bottom:8px;}
.sItem .sName{color:#fff;font-size:14px;font-weight:700;margin-bottom:3px;}
.sItem .sDesc{color:#666;font-size:11px;margin-bottom:10px;}
.sItem .sPrice{display:inline-flex;align-items:center;gap:5px;background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.35);border-radius:14px;padding:5px 13px;color:#ffd700;font-size:13px;font-weight:800;}
.sItem.owned .sPrice{background:rgba(0,255,136,.12);border-color:rgba(0,255,136,.4);color:#00ff88;}

/* HUD - sadece sağ üst köşede mesafe ve para */
#hud{position:fixed;top:0;right:0;z-index:40;pointer-events:none;}
#hudBar{display:flex;align-items:center;gap:12px;padding:14px 18px;background:linear-gradient(180deg,rgba(0,0,0,.65),transparent);}
#hudCoins{display:flex;align-items:center;gap:6px;color:#ffd700;font-size:20px;font-weight:700;}
#hudDist{color:#8ab4f8;font-size:16px;font-weight:600;}

/* ITEM BAR */
#itemBar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:40;pointer-events:auto;}
.iSlot{width:62px;height:62px;border:2.5px solid rgba(255,255,255,.2);border-radius:14px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:.2s;cursor:pointer;}
.iSlot:active{transform:scale(.92);border-color:var(--c2);}
.iSlot.on{border-color:var(--c2);box-shadow:0 0 18px rgba(255,215,0,.5);}
.iSlot.empty{opacity:.35;cursor:default;}
.iSlot .iCnt{position:absolute;bottom:2px;right:4px;font-size:11px;font-weight:900;color:var(--c2);}
.iSlot .iLbl{font-size:7px;color:#888;margin-top:1px;letter-spacing:.5px;}

/* ITEM SELECT */
#itemSel{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);
  backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;}
#itemSel.off{display:none;}
.isTitle{font-family:'Bebas Neue',cursive;font-size:32px;color:#fff;letter-spacing:3px;margin-bottom:22px;}
.isGrid{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.isCard{width:110px;padding:20px 10px;background:rgba(255,255,255,.06);border:2.5px solid rgba(255,255,255,.15);border-radius:18px;text-align:center;cursor:pointer;transition:.2s;}
.isCard:active{transform:scale(.97);border-color:var(--c2);background:rgba(255,215,0,.1);}
.isCard.dis{opacity:.35;pointer-events:none;}
.isCard .isIco{display:flex;align-items:center;justify-content:center;height:44px;}
.isCard .isNm{color:#fff;font-size:13px;font-weight:700;margin-top:7px;}
.isCard .isCnt{color:var(--c2);font-size:12px;margin-top:3px;}
.isClose{margin-top:22px;padding:12px 40px;border:1.5px solid rgba(255,255,255,.25);border-radius:30px;background:rgba(255,255,255,.07);color:#fff;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;cursor:pointer;}
.isClose:active{transform:scale(.97);}

/* GAME OVER */
#sOver{background:radial-gradient(ellipse at center,#1a0000,#000);position:relative;overflow:hidden;}
.goTitle{font-family:'Bebas Neue',cursive;font-size:clamp(48px,10vw,72px);color:var(--c3);text-shadow:0 0 40px #ff0000;animation:goShake .6s ease both;}
@keyframes goShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
.goStats{color:#ccc;font-size:18px;line-height:2.2;text-align:center;margin:18px 0;}
.goStats b{color:var(--c2);font-size:22px;}
.goBtns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px;}

/* TOAST */
#toast{position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:rgba(255,215,0,.95);color:#000;font-weight:800;font-size:15px;
  padding:11px 26px;border-radius:30px;z-index:300;opacity:0;
  transition:.25s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- HUD - sadece para ve mesafe, skor yok -->
<div id="hud">
  <div id="hudBar">
    <div id="hudDist">0 m</div>
    <div id="hudCoins"><svg width="20" height="20" viewBox="0 0 24 24" fill="#ffd700" stroke="#c8800a" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><text x="12" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a4800" stroke="none">₺</text></svg> <span id="cCnt">0</span></div>
  </div>
</div>
<div id="itemBar" style="display:none">
  <div class="iSlot" id="sl0" onclick="useItem('boost')">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ff6a00" stroke-width="2" stroke-linecap="round"><path d="M12 2L8 8H4l4 4-2 6 6-3 6 3-2-6 4-4h-4z"/><line x1="12" y1="14" x2="12" y2="20"/></svg>
    <span class="iCnt" id="ic0">0</span><span class="iLbl">BOOST</span>
  </div>
  <div class="iSlot" id="sl1" onclick="useItem('magnet')">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round"><path d="M6 4v6a6 6 0 0 0 12 0V4"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
    <span class="iCnt" id="ic1">0</span><span class="iLbl">MKNTS</span>
  </div>
  <div class="iSlot" id="sl2" onclick="useItem('shield')">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7z"/></svg>
    <span class="iCnt" id="ic2">0</span><span class="iLbl">KALKAN</span>
  </div>
  <div class="iSlot" id="sl3" onclick="useItem('slow')">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="iCnt" id="ic3">0</span><span class="iLbl">YAVAŞ</span>
  </div>
</div>
<!-- hint kaldırıldı -->

<!-- MAIN MENU -->
<div id="sMain" class="scr">
  <div class="menuTitle">EMİR<br>OYUNU</div>
  <div class="menuSub">Dog Chase Runner</div>
  <div class="menuBtns">
    <button class="mBtn mBtn-play" onclick="startGame()">▶ &nbsp; OYNA</button>
    <button class="mBtn mBtn-shop" onclick="showShop()">🛒 &nbsp; MARKET</button>
    <button class="mBtn mBtn-about" onclick="showAbout()">ℹ &nbsp; HAKKINDA</button>
  </div>
</div>

<!-- ABOUT -->
<div id="sAbout" class="scr off">
  <div class="aboutCard">
    <div class="aboutTitle">Hakkında</div>
    <div class="aboutRow">Oyun Adı <span>Emir Oyunu</span></div>
    <div class="aboutRow">Yapımcı <span>Kuzey Çelik</span></div>
    <div class="aboutRow">Model Alımı <span>SclerLabs</span></div>
    <div class="aboutRow">Platform <span>Android & PC</span></div>
    <div class="aboutRow">Versiyon <span>1.0.0</span></div>
    <button class="backBtn" onclick="showMain()">← GERİ</button>
  </div>
</div>

<!-- SHOP -->
<div id="sShop" class="scr off">
  <div class="shopHeader">
    <div class="shopTitle">🛒 Market</div>
    <div class="shopCoinsBox"><svg width="18" height="18" viewBox="0 0 24 24" fill="#ffd700" stroke="#c8800a" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg> <span id="shopCoinVal">0</span></div>
  </div>
  <div class="shopGrid" id="shopGrid"></div>
  <button class="backBtn" onclick="showMain()">← GERİ</button>
</div>

<!-- GAME OVER -->
<div id="sOver" class="scr off">
  <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0.18" viewBox="0 0 400 700" preserveAspectRatio="xMidYMid slice">
    <g stroke="#ff2d55" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M 20 80 Q 60 60 40 120 Q 20 150 70 140 Q 110 130 90 180" stroke-dasharray="200" stroke-dashoffset="200"><animate attributeName="stroke-dashoffset" values="200;0" dur="1.2s" fill="freeze" begin="0.2s"/></path>
      <path d="M 380 60 Q 340 80 360 130 Q 380 160 330 155 Q 290 148 310 200" stroke-dasharray="220" stroke-dashoffset="220"><animate attributeName="stroke-dashoffset" values="220;0" dur="1.1s" fill="freeze" begin="0.4s"/></path>
    </g>
  </svg>
  <div class="goTitle">💥 ÇARPTIN!</div>
  <div class="goStats">
    Mesafe: <b id="goD">0</b> m<br>
    Para: <b id="goC">0</b> 🪙<br>
    En Uzak: <b id="goH">0</b> m
  </div>
  <div class="goBtns">
    <button class="mBtn mBtn-play" style="width:160px" onclick="startGame()">🔄 TEKRAR</button>
    <button class="mBtn mBtn-shop" style="width:160px" onclick="showShop()">🛒 MARKET</button>
    <button class="mBtn mBtn-about" style="width:160px" onclick="showMain()">🏠 MENÜ</button>
  </div>
</div>

<!-- ITEM SELECT -->
<div id="itemSel" class="off">
  <div class="isTitle">⚡ Eşya Seç</div>
  <div class="isGrid" id="isGrid"></div>
  <button class="isClose" onclick="closeItemSel()">✕ İPTAL</button>
</div>

<div id="toast"></div>

<script>
(function(){
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  s.onload=boot;
  document.head.appendChild(s);
})();

/* ── PERSIST ─────────────────────────────── */
let totalCoins=+localStorage.getItem('ec_coins')||0;
let highDist  =+localStorage.getItem('ec_hi')   ||0;
let inventory =JSON.parse(localStorage.getItem('ec_inv')||'{"boost":0,"magnet":0,"shield":0,"slow":0}');
let upgrades  =JSON.parse(localStorage.getItem('ec_upg')||'{}');
function saveAll(){
  localStorage.setItem('ec_coins',totalCoins);
  localStorage.setItem('ec_inv',JSON.stringify(inventory));
  localStorage.setItem('ec_upg',JSON.stringify(upgrades));
}

/* ── SHOP DATA ───────────────────────────── */
const SVG_ICONS={
  boost:`<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#ff6a00" stroke-width="2" stroke-linecap="round"><path d="M12 2L8 8H4l4 4-2 6 6-3 6 3-2-6 4-4h-4z"/><line x1="12" y1="14" x2="12" y2="20"/></svg>`,
  magnet:`<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round"><path d="M6 4v6a6 6 0 0 0 12 0V4"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>`,
  shield:`<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7z"/></svg>`,
  slow:`<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>`,
  sneaker:`<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"><path d="M2 16l3-8 4 3 5-7 6 5v4c0 1-1 2-2 2H4c-1 0-2-1-2-2z"/></svg>`,
  jetpack:`<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"><rect x="8" y="2" width="8" height="12" rx="3"/><path d="M6 8v6a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8"/><line x1="10" y1="18" x2="10" y2="22"/><line x1="14" y1="18" x2="14" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>`,
  x2:`<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><text x="12" y="17" text-anchor="middle" font-size="10" font-weight="900" fill="#ffd700" stroke="none">x2</text></svg>`,
  longbt:`<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round"><path d="M6 12l-3 8h18l-3-8"/><rect x="8" y="4" width="8" height="9" rx="2"/></svg>`,
};

const ITEMS=[
  {id:'boost',  ico:'boost', name:'Hız Roketi',    desc:'5 sn süper hız',      price:80, cons:true},
  {id:'magnet', ico:'magnet',name:'Para Mıknatısı', desc:'Paraları çeker',       price:60, cons:true},
  {id:'shield', ico:'shield',name:'Kalkan',         desc:'1 çarpışma engelle',   price:100,cons:true},
  {id:'slow',   ico:'slow',  name:'Zaman Yavaşlat', desc:'Köpek yavaşlar',       price:90, cons:true},
  {id:'sneaker',ico:'sneaker',name:'Koşu Ayakkabı', desc:'Zıplama +50%',         price:300,cons:false},
  {id:'jetpack',ico:'jetpack',name:'Jet Pack',      desc:'Çift zıplama!',        price:500,cons:false},
  {id:'x2',     ico:'x2',   name:'2x Para',         desc:'Paralar 2 kat değer',  price:400,cons:false},
  {id:'longbt', ico:'longbt',name:'Uzun Bot',        desc:'Kayma süresi 2x',     price:250,cons:false},
];

/* ── GLOBALS ─────────────────────────────── */
let renderer,scene,camera,clock;
let manGroup,dogGroup;
let roadTiles=[],obstacles=[],coins=[];
let gameActive=false;
let dist=0,sesCoins=0,spd=0.3;
let spawnT=0,coinT=0;
let tgtLane=1;
let jumping=false,sliding=false,jumpV=0;
let lastTap=0;
let activeFX={boost:0,magnet:0,shield:0,slow:0};
let legPhase=0,armPhase=0,dogPhase=0;
const LANES=[-3,0,3];

/* ── BOOT ────────────────────────────────── */
function boot(){
  const canvas=document.getElementById('c');
  // Antialias kapat - performans için
  renderer=new THREE.WebGLRenderer({canvas,antialias:false,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.5)); // düşük pixel ratio
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=false; // shadow kapalı - performans
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;
  try{renderer.outputColorSpace='srgb';}catch(e){}

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x87ceeb);
  scene.fog=new THREE.Fog(0xb0d8f0,80,180); // FogExp2 yerine Fog - daha hızlı

  camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,200);
  // Kamera arkadan yukarıdan bakıyor, adam ileriye (−Z) koşuyor
  camera.position.set(0,5.5,11);
  camera.lookAt(0,1.5,-8);

  clock=new THREE.Clock();
  buildLights();
  buildRoad();
  buildCityBg();
  buildMan();
  buildDog();
  setupInput();
  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
  loop();
}

/* ── LIGHTS ──────────────────────────────── */
function buildLights(){
  ambLight=new THREE.AmbientLight(0xfff5e0,3.0);
  scene.add(ambLight);
  sunLight=new THREE.DirectionalLight(0xfff8d0,2.5);
  sunLight.position.set(10,40,10);
  scene.add(sunLight);
  fillLight=new THREE.DirectionalLight(0xa8d8ea,1.0);
  fillLight.position.set(-10,15,10);
  scene.add(fillLight);
}

/* ── ROAD ────────────────────────────────── */
function buildRoad(){
  for(let i=0;i<8;i++){
    const g=new THREE.Group();
    const road=new THREE.Mesh(new THREE.PlaneGeometry(10,30),
      new THREE.MeshLambertMaterial({color:0x484850}));
    road.rotation.x=-Math.PI/2; g.add(road);
    // Lane markings
    for(let d=0;d<9;d++){
      for(let l=0;l<2;l++){
        const dash=new THREE.Mesh(new THREE.PlaneGeometry(.1,2),
          new THREE.MeshBasicMaterial({color:0xffffff}));
        dash.rotation.x=-Math.PI/2;
        dash.position.set(l===0?-1.5:1.5,.01,-13+d*3.2);
        g.add(dash);
      }
    }
    // Sidewalks flush with road (top at y=0)
    [-6.5,6.5].forEach(x=>{

/* ── DAY/NIGHT CYCLE ─────────────────────── */
let dayTime=0; // 0=noon, 0.5=midnight, goes 0..1
const DAY_DUR=20; // seconds for full day cycle
let ambLight,sunLight,fillLight;

/* ── CITY BG ─────────────────────────────── */
const streetLamps=[];

/* ── CITY TILES (scroll with road) ──────────── */
const cityTiles=[];   // her tile bir THREE.Group, roadTile gibi sarılır
const allWindowLights=[];  // tüm pencerelerin matlerialları gece güncellenmesi için

function buildCityBg(){
  const pal=[
    0xff6b35,0xf7c59f,0x4fc3f7,0x004e89,0x1a936f,
    0xc84b31,0x2d6a4f,0x4a4e69,0xe07a5f,0x3d405b,
    0x81b29a,0xf2cc8f,0x264653,0xe9c46a,0x457b9d,
    0xd62828,0x2196f3,0x4caf50,0xff9800,0x9c27b0
  ];
  const TILE_LEN=60;   // her tile kaç birim Z kaplıyor
  const N_TILES=5;     // kaç tile (N_TILES * TILE_LEN yol uzunluğunu karşılar)
  const rng=(a,b)=>a+Math.random()*(b-a);

  for(let t=0;t<N_TILES;t++){
    const tileG=new THREE.Group();
    tileG.position.z=-t*TILE_LEN;

    // Her tile'da her iki tarafa binalar
    const bCount=6+Math.floor(rng(0,5)); // tile başına 6-10 bina
    for(let i=0;i<bCount;i++){
      const h=rng(10,36), w=rng(5,10), d=rng(4,8);
      const col=pal[Math.floor(rng(0,pal.length))];
      const mat=new THREE.MeshLambertMaterial({color:col});
      const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
      const side=i%2===0?-1:1;
      const bx=side*(11+rng(0,14));
      const bz=-rng(0,TILE_LEN);
      b.position.set(bx,h/2,bz);
      tileG.add(b);

      // Pencereler
      const rows=Math.floor(h/3.5), cols2=Math.floor(w/2.8);
      for(let wr=0;wr<rows;wr++){
        for(let wc=0;wc<cols2;wc++){
          const winMat=new THREE.MeshBasicMaterial({color:0xffffaa,transparent:true,opacity:0});
          const win=new THREE.Mesh(new THREE.PlaneGeometry(.6,.5),winMat);
          // pencerenin yüzü kameraya bakan tarafa
          const frontZ=side>0? bz-(d/2+.03) : bz+(d/2+.03);
          win.position.set(bx - w/2 + 1.4 + wc*2.5, h/2-h+2.5+wr*3.2, frontZ);
          win.rotation.y=side>0?0:Math.PI;
          tileG.add(win);
          allWindowLights.push({mesh:win,alwaysOn:Math.random()<.55,flickerOffset:Math.random()*Math.PI*2});
        }
      }
    }

    // Sokak lambaları - tile başına her iki tarafta 4 tane
    for(let li=0;li<4;li++){
      [-8.5,8.5].forEach(side=>{
        const g=new THREE.Group();
        const pole=new THREE.Mesh(new THREE.CylinderGeometry(.07,.1,4.2,6),
          new THREE.MeshLambertMaterial({color:0x99aabb}));
        pole.position.y=2.1; g.add(pole);
        const arm=new THREE.Mesh(new THREE.BoxGeometry(.7,.1,.1),
          new THREE.MeshLambertMaterial({color:0x99aabb}));
        arm.position.set(side>0?-.35:.35,4.2,0); g.add(arm);
        const lampMat=new THREE.MeshBasicMaterial({color:0x777766});
        const head=new THREE.Mesh(new THREE.BoxGeometry(.55,.24,.55),lampMat);
        head.position.set(side>0?-.7:.7,4.15,0); g.add(head);
        const pl=new THREE.PointLight(0xffe8a0,0,16);
        pl.position.set(side>0?-.7:.7,3.9,0);
        g.add(pl);
        g.position.set(side,0,-li*(TILE_LEN/4)-rng(0,4));
        tileG.add(g);
        streetLamps.push({group:g,light:pl,lampHead:head,lampMat});
      });
    }

    tileG.userData.len=TILE_LEN;
    scene.add(tileG);
    cityTiles.push(tileG);
  }
}

/* city tile scroll - roadTile gibi */
function scrollCityTiles(){
  const TOTAL=60*5; // N_TILES * TILE_LEN
  const s=spd*(activeFX.boost>0?2.2:activeFX.slow>0?.4:1);
  cityTiles.forEach(t=>{
    t.position.z+=s;
    if(t.position.z>60) t.position.z-=TOTAL;
  });
}

/* Update day/night every frame */
function updateDayNight(dt){
  if(!gameActive) return;
  dayTime=(dayTime+dt/DAY_DUR)%1;
  // t: 0=noon, 0.5=midnight
  const t=dayTime;
  // sun angle: noon=top, midnight=bottom
  const angle=t*Math.PI*2;
  const sunY=Math.cos(angle); // 1 at noon, -1 at midnight
  const isNight=sunY<0;
  const nightFactor=Math.max(0,-sunY); // 0..1

  // Sky color lerp day→night
  const dayColor=new THREE.Color(0x6ecbf5);
  const nightColor=new THREE.Color(0x050a18);
  const duskColor=new THREE.Color(0xff7733);
  let skyCol;
  if(sunY>0.3){skyCol=dayColor;}
  else if(sunY>-0.1){
    const f=(0.3-sunY)/0.4;
    skyCol=dayColor.clone().lerp(duskColor,f);}
  else{
    const f=Math.min(1,(-sunY-0.1)/0.4);
    skyCol=duskColor.clone().lerp(nightColor,f);}
  scene.background=skyCol;

  // Fog
  if(isNight){
    scene.fog=new THREE.Fog(nightColor,30,120);
  }else{
    scene.fog=new THREE.Fog(0xb0d8f0,80,180);
  }

  // Ambient & sun
  if(ambLight){
    const dayAmb=3.0, nightAmb=0.3;
    ambLight.intensity=dayAmb+(nightAmb-dayAmb)*nightFactor;
    const dayCol=new THREE.Color(0xfff5e0);
    const nightCol=new THREE.Color(0x1a2040);
    ambLight.color.lerpColors(dayCol,nightCol,nightFactor);
  }
  if(sunLight){
    sunLight.intensity=Math.max(0,sunY)*2.5;
    sunLight.position.set(Math.sin(angle)*40, sunY*40, 10);
  }

  // Street lamps — on at night
  streetLamps.forEach(sl=>{
    const on=nightFactor>0.5;
    sl.light.intensity=on?(nightFactor*1.8):0;
    sl.lampMat.color.set(on?0xffffa0:0x888888);
  });

  // Window lights — on at night randomly
  allWindowLights.forEach(wl=>{
    if(wl.alwaysOn){
      wl.mesh.material.opacity=nightFactor*(0.7+0.3*Math.sin(wl.flickerOffset+Date.now()*.001));
    } else {
      wl.mesh.material.opacity=nightFactor>0.6?(nightFactor*.85):0;
    }
  });
}

let _coinTex=null;
function getCoinTex(){
  if(_coinTex) return _coinTex;
  const sz=64,cv=document.createElement('canvas');
  cv.width=sz; cv.height=sz;
  const ctx=cv.getContext('2d');
  const grd=ctx.createRadialGradient(sz/2,sz/2,4,sz/2,sz/2,sz/2-2);
  grd.addColorStop(0,'#ffe066'); grd.addColorStop(1,'#c8800a');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(sz/2,sz/2,sz/2-2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#7a4800'; ctx.font='bold 36px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('₺',sz/2+1,sz/2+1);
  ctx.fillStyle='#fff5c0'; ctx.fillText('₺',sz/2,sz/2);
  _coinTex=new THREE.CanvasTexture(cv);
  return _coinTex;
}
function spawnCoins(){
  const lane=Math.floor(Math.random()*3);
  const cnt=2+Math.floor(Math.random()*3);
  const tex=getCoinTex();
  const edgeMat=new THREE.MeshBasicMaterial({color:0xc8800a});
  const faceMat=new THREE.MeshBasicMaterial({map:tex});
  for(let i=0;i<cnt;i++){
    const cg=new THREE.CylinderGeometry(.28,.28,.05,16);

}

/* ── ANIMATIONS ──────────────────────────── */
function animateMan(dt){
  if(!manGroup) return;
  const spd2=gameActive&&!sliding?10*(activeFX.boost>0?1.6:1):0;
  legPhase+=dt*spd2;
  armPhase+=dt*(spd2*.8);

  const lL=manGroup.getObjectByName('leg-1');
  const lR=manGroup.getObjectByName('leg1');
  if(lL) lL.rotation.x=Math.sin(legPhase)*.7;
  if(lR) lR.rotation.x=Math.sin(legPhase+Math.PI)*.7;
  const aL=manGroup.getObjectByName('arm-1');
  const aR=manGroup.getObjectByName('arm1');
  if(aL) aL.rotation.x=Math.sin(armPhase+Math.PI)*.5;
  if(aR) aR.rotation.x=Math.sin(armPhase)*.5;

  // Head bob
  const h=manGroup.getObjectByName('head');
  if(h&&gameActive) h.rotation.x=Math.sin(legPhase*.5)*.05;

  // Jump
  if(jumping){
    jumpV-=dt*(upgrades.sneaker?18:24);
    manGroup.position.y+=jumpV*dt;
    if(manGroup.position.y<=0){manGroup.position.y=0;jumping=false;jumpV=0;}
  }

  // Slide
  manGroup.scale.y+=(( sliding?.45:1)-manGroup.scale.y)*.18;

  // Lane lerp
  manGroup.position.x+=(LANES[tgtLane]-manGroup.position.x)*.17;
  // Eğilme - rotation.y=0 olduğundan normal yön
  manGroup.rotation.z=-(LANES[tgtLane]-manGroup.position.x)*.08;

  // Camera follow
  camera.position.x+=(manGroup.position.x*.1-camera.position.x)*.06;
}

function animateDog(dt){
  if(!dogGroup) return;
  dogPhase+=dt*(activeFX.slow>0?6:14);

  // Bacak hareketi - diyagonal çiftler
  ['dFL','dBR'].forEach(n=>{const m=dogGroup.getObjectByName(n);if(m)m.rotation.x=Math.sin(dogPhase)*.85;});
  ['dFR','dBL'].forEach(n=>{const m=dogGroup.getObjectByName(n);if(m)m.rotation.x=Math.sin(dogPhase+Math.PI)*.85;});

  // Kuyruk sallama - hızlı ve net, rotation.z yerine rotation.x kullan
  // Kuyruk +Z yönünde, tail.rotation.z = yanlara sallama
  const tail=dogGroup.getObjectByName('dogTail');
  if(tail){
    tail.rotation.z=Math.sin(dogPhase*2.8)*.8; // yanlara
    tail.rotation.x=-.3+Math.abs(Math.sin(dogPhase*1.5))*.4; // yukarı-aşağı
  }

  // Kafa sallama
  const dH=dogGroup.getObjectByName('dogHead');
  if(dH) dH.position.y=.88+Math.sin(dogPhase*2)*.035;

  // Kulak sallama
  const eL=dogGroup.getObjectByName('earL');
  const eR=dogGroup.getObjectByName('earR');
  if(eL) eL.rotation.x=Math.sin(dogPhase*.8)*.2;
  if(eR) eR.rotation.x=Math.sin(dogPhase*.8+.5)*.2;

  // Body bounce
  dogGroup.position.y=Math.abs(Math.sin(dogPhase))*.08;

  // Aynı şeride takip
  dogGroup.position.x+=(LANES[tgtLane]-dogGroup.position.x)*.05;

  // Yavaşça yaklaşıyor ama yakalamıyor
  if(gameActive){
    const cr=activeFX.slow>0?.0005:.002;
    dogGroup.position.z=Math.min(dogGroup.position.z+cr,6.5);
  }
}

/* ── UPDATE OBS ──────────────────────────── */
function updateObs(dt){
  const s=spd*(activeFX.boost>0?2.2:1);
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];
    o.position.z+=s;
    if(o.position.z>14){scene.remove(o);obstacles.splice(i,1);continue;}
    if(activeFX.shield>0) continue;
    const dx=Math.abs(manGroup.position.x-o.position.x);
    const dz=Math.abs(manGroup.position.z-o.position.z);
    if(dx<1.1&&dz<2.0){
      if(sliding&&o.userData.h<.9) continue;
      if(jumping&&manGroup.position.y>1.2) continue;
      if(activeFX.shield>0){activeFX.shield=0;toast('Kalkan kırıldı!');continue;}
      endGame(); return;
    }
  }
}

function updateCoins(dt){
  const s=spd*(activeFX.boost>0?2.2:1);
  const mr=activeFX.magnet>0?4.0:.85;
  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i];
    c.position.z+=s;
    c.rotation.y+=dt*4;
    if(activeFX.magnet>0){
      const dx=Math.abs(manGroup.position.x-c.position.x);
      const dz=Math.abs(manGroup.position.z-c.position.z);
      if(dx<mr&&dz<mr){
        c.position.x+=(manGroup.position.x-c.position.x)*.14;
        c.position.z+=(manGroup.position.z-c.position.z)*.14;
      }
    }
    const dx2=Math.abs(manGroup.position.x-c.position.x);
    const dz2=Math.abs(manGroup.position.z-c.position.z);
    if(dx2<.9&&dz2<1.0){
      const v=upgrades.x2?2:1;
      sesCoins+=v; totalCoins+=v;
      localStorage.setItem('ec_coins',totalCoins);
      scene.remove(c); coins.splice(i,1);
      updateHUD(); continue;
    }
    if(c.position.z>14){scene.remove(c);coins.splice(i,1);}
  }
}

/* ── ROAD SCROLL ─────────────────────────── */
function scrollRoad(){
  const s=spd*(activeFX.boost>0?2.2:activeFX.slow>0?.4:1);
  roadTiles.forEach(t=>{t.position.z+=s;if(t.position.z>60)t.position.z-=240;});
}

/* ── MAIN LOOP ───────────────────────────── */
let frameCount=0;
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.04);
  if(gameActive){
    spd=.26+dist*.00007;
    dist+=spd*60*dt;
    spawnT+=dt; coinT+=dt;
    // Araba sık gelsin - interval daha kısa
    const si=Math.max(.5,1.8-dist*.0015);
    if(spawnT>si){spawnT=0;spawnCar();}
    if(coinT>.9){coinT=0;spawnCoins();}
    scrollRoad();
    scrollCityTiles();
    updateObs(dt);
    updateCoins(dt);
    updateDayNight(dt);
    // FX sayacı - frame bazlı değil dt bazlı
    Object.keys(activeFX).forEach(k=>{if(activeFX[k]>0)activeFX[k]-=dt*60;});
    updateHUD();
  }
  animateMan(dt);
  animateDog(dt);
  renderer.render(scene,camera);
}

/* ── HUD ─────────────────────────────────── */
function updateHUD(){
  document.getElementById('hudDist').textContent=Math.floor(dist)+' m';
  document.getElementById('cCnt').textContent=sesCoins;
  ['boost','magnet','shield','slow'].forEach((id,i)=>{
    document.getElementById('ic'+i).textContent=inventory[id]||0;
    document.getElementById('sl'+i).className='iSlot'+(activeFX[id]>0?' on':'');
  });
}

/* ── START / END ─────────────────────────── */
function startGame(){
  hideAll();
  dist=0;sesCoins=0;spd=.26;spawnT=0;coinT=0;
  tgtLane=1;jumping=false;sliding=false;jumpV=0;
  activeFX={boost:0,magnet:0,shield:0,slow:0};
  obstacles.forEach(o=>scene.remove(o)); obstacles=[];
  coins.forEach(c=>scene.remove(c)); coins=[];
  manGroup.position.set(LANES[1],0,0); manGroup.scale.set(1,1,1); manGroup.rotation.y=0;
  dogGroup.position.set(LANES[1],0,7); dogGroup.rotation.y=0;
  gameActive=true;
  updateHUD();
  document.getElementById('itemBar').style.display='flex';
}

function endGame(){
  if(!gameActive) return;
  gameActive=false;
  const d=Math.floor(dist);
  if(d>highDist){highDist=d;localStorage.setItem('ec_hi',highDist);}
  document.getElementById('goD').textContent=d;
  document.getElementById('goC').textContent=sesCoins;
  document.getElementById('goH').textContent=highDist;
  document.getElementById('sOver').classList.remove('off');
  document.getElementById('itemBar').style.display='none';
}

/* ── SCREEN NAV ──────────────────────────── */
function hideAll(){
  ['sMain','sAbout','sShop','sOver'].forEach(id=>document.getElementById(id).classList.add('off'));
  document.getElementById('itemBar').style.display='none';
}
function showMain(){gameActive=false;hideAll();document.getElementById('sMain').classList.remove('off');}
function showAbout(){hideAll();document.getElementById('sAbout').classList.remove('off');}
function showShop(){hideAll();document.getElementById('sShop').classList.remove('off');renderShop();}

/* ── SHOP ────────────────────────────────── */
function renderShop(){
  document.getElementById('shopCoinVal').textContent=totalCoins;
  const g=document.getElementById('shopGrid'); g.innerHTML='';
  ITEMS.forEach(item=>{
    const owned=!item.cons&&upgrades[item.id];
    const cnt=item.cons?(inventory[item.id]||0):null;
    const d=document.createElement('div');
    d.className='sItem'+(owned?' owned':'');
    d.innerHTML=`<div class="sIco">${SVG_ICONS[item.ico]||item.ico}</div>
      <div class="sName">${item.name}</div>
      <div class="sDesc">${item.desc}</div>
      <div class="sPrice">${owned?'✓ SAHİPSİN':cnt!==null?`${item.price} ₺ (x${cnt})`:`${item.price} ₺`}</div>`;
    if(!owned) d.onclick=()=>buy(item);
    g.appendChild(d);
  });
}
function buy(item){
  if(totalCoins<item.price){toast('Yeterli para yok!');return;}
  if(!item.cons&&upgrades[item.id]){toast('Zaten sahipsiniz!');return;}
  totalCoins-=item.price;
  if(item.cons) inventory[item.id]=(inventory[item.id]||0)+1;
  else upgrades[item.id]=true;
  saveAll();
  toast(`${item.name} alındı!`);
  renderShop();
}

/* ── ITEM SELECT ─────────────────────────── */
function openItemSel(){
  if(!gameActive) return;
  gameActive=false;
  const ov=document.getElementById('itemSel'); ov.classList.remove('off');
  const g=document.getElementById('isGrid'); g.innerHTML='';
  [{id:'boost',ico:'boost',name:'Hız Roketi'},
   {id:'magnet',ico:'magnet',name:'Mıknatıs'},
   {id:'shield',ico:'shield',name:'Kalkan'},
   {id:'slow',ico:'slow',name:'Yavaşlat'}].forEach(it=>{
    const c=document.createElement('div');
    c.className='isCard'+(inventory[it.id]>0?'':' dis');
    c.innerHTML=`<div class="isIco">${SVG_ICONS[it.ico]||it.ico}</div><div class="isNm">${it.name}</div><div class="isCnt">${inventory[it.id]||0} adet</div>`;
    if(inventory[it.id]>0) c.onclick=()=>useItem(it.id);
    g.appendChild(c);
  });
}
function closeItemSel(){
  document.getElementById('itemSel').classList.add('off');
  gameActive=true;
}
function useItem(id){
  if(!gameActive) return;
  if(!(inventory[id]>0)){toast('Stokta yok!');return;}
  inventory[id]--;
  saveAll();
  const DUR={boost:300,magnet:600,shield:9999999,slow:400};
  activeFX[id]=DUR[id];
  const IC={boost:'Boost',magnet:'Mıknatıs',shield:'Kalkan',slow:'Yavaşlat'};
  toast(`${IC[id]} aktif!`);
  updateHUD();
}

/* ── INPUT ───────────────────────────────── */
let tx=0,ty=0;
function setupInput(){
  // Çift tap - itemSel aç
  // Tek tap/swipe - hareket
  document.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    tx=t.clientX; ty=t.clientY;
    const now=Date.now();
    if(now-lastTap<300){
      // Çift tap
      if(gameActive){ openItemSel(); e.preventDefault(); return; }
    }
    lastTap=now;
  },{passive:false});

  document.addEventListener('touchend',e=>{
    if(!gameActive) return;
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    swipe(dx,dy);
  },{passive:false});

  let md=false,mx=0,my=0;
  document.addEventListener('mousedown',e=>{
    md=true; mx=e.clientX; my=e.clientY;
    const now=Date.now();
    if(now-lastTap<300&&gameActive) openItemSel();
    lastTap=now;
  });
  document.addEventListener('mouseup',e=>{
    if(!md) return; md=false;
    swipe(e.clientX-mx,e.clientY-my);
  });

  document.addEventListener('keydown',e=>{
    if(!gameActive){if(e.key===' ')closeItemSel();return;}
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') lane(-1);
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') lane(1);
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') doJump();
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') doSlide();
    e.preventDefault();
  });
}

function swipe(dx,dy){
  if(!gameActive) return;
  const th=25;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx<-th) lane(-1); else if(dx>th) lane(1);
  } else {
    if(dy<-th) doJump(); else if(dy>th) doSlide();
  }
}
function lane(d){tgtLane=Math.max(0,Math.min(2,tgtLane+d));}
function doJump(){
  if(jumping){if(upgrades.jetpack)jumpV=7;return;}
  jumping=true; jumpV=upgrades.sneaker?9.5:7;
}
function doSlide(){
  if(jumping){manGroup.position.y=0;jumping=false;jumpV=0;return;}
  if(sliding)return;
  sliding=true;
  setTimeout(()=>sliding=false,upgrades.longbt?1400:700);
}

/* ── TOAST ───────────────────────────────── */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
