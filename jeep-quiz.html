<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚙 JEEP QUIZ - Lab Legends</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap');
  :root{--jeep-green:#2d5a1b;--jeep-yellow:#f5c518;--jeep-orange:#e8640a;--jeep-dark:#1a1a1a;--jeep-mud:#5c3d1e;--jeep-sand:#f0e6d3}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:var(--jeep-dark);min-height:100vh;overflow-x:hidden;position:relative}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(45,90,27,.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(232,100,10,.2) 0%,transparent 50%),radial-gradient(ellipse at 60% 80%,rgba(245,197,24,.1) 0%,transparent 50%);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;bottom:0;left:0;right:0;height:110px;background:repeating-linear-gradient(90deg,var(--jeep-mud) 0px,var(--jeep-mud) 40px,#7a5230 40px,#7a5230 80px,var(--jeep-mud) 80px);clip-path:polygon(0% 60%,5% 40%,10% 55%,15% 30%,20% 50%,25% 35%,30% 55%,35% 25%,40% 50%,45% 40%,50% 60%,55% 35%,60% 50%,65% 30%,70% 55%,75% 40%,80% 60%,85% 35%,90% 50%,95% 45%,100% 60%,100% 100%,0% 100%);z-index:0;opacity:.6}
  .container{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:20px 16px 160px}
  .header{text-align:center;margin-bottom:28px;animation:headerDrop .7s cubic-bezier(.22,1,.36,1) both}
  @keyframes headerDrop{from{opacity:0;transform:translateY(-60px) rotate(-3deg)}to{opacity:1;transform:none}}
  .jeep-svg{width:170px;margin:0 auto 12px;display:block;filter:drop-shadow(0 8px 24px rgba(0,0,0,.6));animation:jeepBounce 2.5s ease-in-out infinite}
  @keyframes jeepBounce{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}
  .title{font-family:'Bangers',cursive;font-size:clamp(2.8rem,8vw,5rem);color:var(--jeep-yellow);letter-spacing:4px;text-shadow:4px 4px 0 var(--jeep-mud),-2px -2px 0 var(--jeep-orange),0 0 40px rgba(245,197,24,.4);line-height:1}
  .subtitle{font-family:'Bangers',cursive;font-size:1.2rem;color:var(--jeep-orange);letter-spacing:3px;margin-top:6px}
  .players{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:26px;animation:fadeUp .6s .3s both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .player-badge{background:linear-gradient(135deg,var(--jeep-green),#4a8a2a);color:#fff;border:2px solid var(--jeep-yellow);border-radius:20px;padding:4px 14px;font-size:.85rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;box-shadow:0 3px 10px rgba(0,0,0,.4)}
  .question-card{background:linear-gradient(145deg,#2a2a2a,#1e1e1e);border:3px solid var(--jeep-yellow);border-radius:20px;padding:26px 22px;margin-bottom:18px;box-shadow:0 0 0 1px rgba(245,197,24,.1),0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;position:relative;overflow:hidden}
  .question-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent 0deg,rgba(245,197,24,.03) 60deg,transparent 120deg);animation:rotateBg 8s linear infinite}
  @keyframes rotateBg{to{transform:rotate(360deg)}}
  @keyframes cardIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:none}}
  .question-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px;position:relative;z-index:1}
  .q-number{font-family:'Bangers',cursive;font-size:1.5rem;color:var(--jeep-yellow);background:rgba(245,197,24,.15);border:2px solid var(--jeep-yellow);border-radius:12px;padding:2px 14px}
  .q-character{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--jeep-orange),#c4520a);border-radius:12px;padding:4px 12px;font-weight:800;font-size:.9rem;color:#fff;box-shadow:0 2px 8px rgba(232,100,10,.4)}
  .question-text{font-size:clamp(1rem,2.5vw,1.15rem);color:var(--jeep-sand);font-weight:700;line-height:1.55;position:relative;z-index:1}
  .answers{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
  .answer-btn{background:linear-gradient(135deg,#2e2e2e,#252525);border:2px solid #444;border-radius:14px;padding:15px 18px;color:var(--jeep-sand);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;text-align:left;transition:all .2s ease;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.3);width:100%}
  .answer-btn:hover:not(:disabled){border-color:var(--jeep-yellow);transform:translateX(6px) scale(1.01);background:linear-gradient(135deg,#3a3a2a,#2e2e1e);box-shadow:0 6px 20px rgba(245,197,24,.2)}
  .answer-btn:active:not(:disabled){transform:scale(.98)}
  .answer-btn .letter{font-family:'Bangers',cursive;font-size:1.4rem;color:var(--jeep-yellow);min-width:26px;text-align:center}
  .answer-btn .sound-icon{margin-left:auto;font-size:1.1rem;opacity:.6;cursor:pointer;transition:opacity .2s;flex-shrink:0}
  .answer-btn .sound-icon:hover{opacity:1}
  .answer-btn.correct{border-color:#4caf50;background:linear-gradient(135deg,#1a3a1a,#152a15);box-shadow:0 0 20px rgba(76,175,80,.4),0 4px 12px rgba(0,0,0,.3);animation:correctPulse .5s ease}
  .answer-btn.wrong{border-color:#f44336;background:linear-gradient(135deg,#3a1a1a,#2a1515);box-shadow:0 0 20px rgba(244,67,54,.4),0 4px 12px rgba(0,0,0,.3);animation:wrongShake .4s ease}
  @keyframes correctPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  @keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .answer-btn:disabled{cursor:not-allowed}
  .feedback{display:none;text-align:center;padding:18px;border-radius:16px;font-family:'Bangers',cursive;font-size:clamp(1.6rem,4.5vw,2.5rem);letter-spacing:2px;margin-bottom:18px;animation:feedbackPop .4s cubic-bezier(.34,1.56,.64,1) both;line-height:1.3}
  @keyframes feedbackPop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  .feedback.correct{display:block;background:linear-gradient(135deg,#1a3a1a,#0d2a0d);border:3px solid #4caf50;color:#69f07a;text-shadow:0 0 20px rgba(105,240,122,.5)}
  .feedback.wrong{display:block;background:linear-gradient(135deg,#3a1a1a,#2a0d0d);border:3px solid #f44336;color:#ff6b6b;text-shadow:0 0 20px rgba(255,107,107,.5)}
  .next-btn{display:none;width:100%;padding:15px;background:linear-gradient(135deg,var(--jeep-green),#4a8a2a);border:3px solid var(--jeep-yellow);border-radius:14px;color:var(--jeep-yellow);font-family:'Bangers',cursive;font-size:1.5rem;letter-spacing:3px;cursor:pointer;transition:all .2s;box-shadow:0 6px 20px rgba(0,0,0,.4);margin-bottom:18px}
  .next-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(245,197,24,.3)}
  /* WHEEL */
  .wheel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;justify-content:center;align-items:center;flex-direction:column;gap:22px;animation:fadeIn .3s ease;padding:20px}
  .wheel-overlay.active{display:flex}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .wheel-title{font-family:'Bangers',cursive;font-size:2.4rem;color:var(--jeep-yellow);letter-spacing:4px;text-shadow:0 0 30px rgba(245,197,24,.6);animation:glowPulse 1s ease-in-out infinite alternate;text-align:center}
  @keyframes glowPulse{from{text-shadow:0 0 20px rgba(245,197,24,.4)}to{text-shadow:0 0 50px rgba(245,197,24,.9)}}
  .wheel-container{position:relative;width:280px;height:280px}
  canvas#wheelCanvas{border-radius:50%;box-shadow:0 0 40px rgba(245,197,24,.4),0 0 0 6px rgba(245,197,24,.3)}
  .wheel-arrow{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:2.5rem;filter:drop-shadow(0 4px 8px rgba(0,0,0,.6));z-index:10}
  .spin-btn{padding:14px 44px;background:linear-gradient(135deg,var(--jeep-orange),#c4520a);border:3px solid var(--jeep-yellow);border-radius:50px;color:#fff;font-family:'Bangers',cursive;font-size:1.7rem;letter-spacing:3px;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px rgba(232,100,10,.4)}
  .spin-btn:hover:not(:disabled){transform:translateY(-3px) scale(1.05);box-shadow:0 12px 32px rgba(232,100,10,.6)}
  .spin-btn:disabled{opacity:.5;cursor:not-allowed}
  .wheel-result{display:none;background:linear-gradient(135deg,#2a2a1a,#1e1e12);border:3px solid var(--jeep-yellow);border-radius:20px;padding:22px 30px;max-width:380px;text-align:center}
  .wheel-result.active{display:block;animation:feedbackPop .5s cubic-bezier(.34,1.56,.64,1) both}
  .wheel-result-text{font-family:'Bangers',cursive;font-size:clamp(1.5rem,4vw,2.2rem);color:var(--jeep-yellow);letter-spacing:2px;line-height:1.4;text-shadow:0 0 20px rgba(245,197,24,.5)}
  .close-wheel-btn{margin-top:14px;padding:12px 30px;background:var(--jeep-green);border:2px solid var(--jeep-yellow);border-radius:12px;color:var(--jeep-yellow);font-family:'Bangers',cursive;font-size:1.3rem;letter-spacing:2px;cursor:pointer;transition:all .2s}
  .close-wheel-btn:hover{transform:scale(1.05)}
  /* PROGRESS */
  .progress-bar-wrap{background:#2a2a2a;border-radius:100px;height:10px;margin-bottom:20px;overflow:hidden;border:1px solid #444}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--jeep-green),var(--jeep-yellow));border-radius:100px;transition:width .5s ease;box-shadow:0 0 10px rgba(245,197,24,.5)}
  .score-display{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;color:#888;font-weight:800;font-size:.9rem;letter-spacing:1px;text-transform:uppercase}
  .score-val{color:var(--jeep-yellow);font-family:'Bangers',cursive;font-size:1.4rem;letter-spacing:2px}
  .hint-banner{display:none;background:linear-gradient(135deg,#1a2a3a,#0d1e2a);border:2px solid #4fc3f7;border-radius:14px;padding:12px 18px;color:#b3e5fc;font-weight:700;font-size:.95rem;margin-bottom:14px;animation:feedbackPop .4s cubic-bezier(.34,1.56,.64,1) both;text-align:center}
  .hint-banner.active{display:block}
  /* END */
  .end-screen{display:none;text-align:center;animation:cardIn .6s cubic-bezier(.22,1,.36,1) both}
  .end-screen.active{display:block}
  .end-title{font-family:'Bangers',cursive;font-size:clamp(3rem,10vw,6rem);color:var(--jeep-yellow);letter-spacing:5px;text-shadow:5px 5px 0 var(--jeep-mud),0 0 50px rgba(245,197,24,.5);line-height:1;margin-bottom:20px}
  .end-score{font-family:'Bangers',cursive;font-size:2rem;color:var(--jeep-orange);letter-spacing:3px;margin-bottom:26px}
  .end-msg{color:var(--jeep-sand);font-size:1.1rem;font-weight:700;margin-bottom:28px;line-height:1.6}
  .restart-btn{padding:15px 44px;background:linear-gradient(135deg,var(--jeep-green),#4a8a2a);border:3px solid var(--jeep-yellow);border-radius:50px;color:var(--jeep-yellow);font-family:'Bangers',cursive;font-size:1.7rem;letter-spacing:3px;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .restart-btn:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 14px 36px rgba(245,197,24,.3)}
  .pushup-anim{font-size:3.5rem;animation:pushupBounce .4s ease-in-out infinite alternate;display:inline-block}
  @keyframes pushupBounce{from{transform:translateY(0)}to{transform:translateY(-16px)}}
  @media(max-width:500px){.container{padding:14px 12px 150px}.answer-btn{padding:13px 14px}.wheel-container{width:230px;height:230px}}
</style>
</head>
<body>

<!-- WHEEL OVERLAY -->
<div class="wheel-overlay" id="wheelOverlay">
  <div class="wheel-title">🎡 LUCKY WHEEL!</div>
  <div class="wheel-container">
    <div class="wheel-arrow">🔻</div>
    <canvas id="wheelCanvas" width="280" height="280"></canvas>
  </div>
  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">SPIN IT! 🌀</button>
  <div class="wheel-result" id="wheelResult">
    <div class="wheel-result-text" id="wheelResultText"></div>
    <button class="close-wheel-btn" onclick="closeWheel()">LET'S GO! 🚙</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <svg class="jeep-svg" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
      <rect x="30" y="70" width="240" height="70" rx="8" fill="#2d5a1b" stroke="#f5c518" stroke-width="3"/>
      <rect x="60" y="30" width="140" height="50" rx="6" fill="#3a7022" stroke="#f5c518" stroke-width="2"/>
      <rect x="70" y="38" width="55" height="32" rx="4" fill="#87ceeb" opacity=".8"/>
      <rect x="135" y="38" width="55" height="32" rx="4" fill="#87ceeb" opacity=".8"/>
      <rect x="250" y="80" width="18" height="12" rx="3" fill="#f5c518" stroke="#e8640a" stroke-width="1.5"/>
      <rect x="255" y="92" width="18" height="28" rx="2" fill="#1a3a0a" stroke="#f5c518" stroke-width="1.5"/>
      <line x1="260" y1="92" x2="260" y2="120" stroke="#f5c518" stroke-width="1"/>
      <line x1="265" y1="92" x2="265" y2="120" stroke="#f5c518" stroke-width="1"/>
      <line x1="270" y1="92" x2="270" y2="120" stroke="#f5c518" stroke-width="1"/>
      <circle cx="80" cy="142" r="28" fill="#1a1a1a" stroke="#555" stroke-width="3"/>
      <circle cx="80" cy="142" r="16" fill="#333" stroke="#f5c518" stroke-width="2"/>
      <circle cx="80" cy="142" r="5" fill="#f5c518"/>
      <circle cx="220" cy="142" r="28" fill="#1a1a1a" stroke="#555" stroke-width="3"/>
      <circle cx="220" cy="142" r="16" fill="#333" stroke="#f5c518" stroke-width="2"/>
      <circle cx="220" cy="142" r="5" fill="#f5c518"/>
      <circle cx="30" cy="140" r="22" fill="#222" stroke="#555" stroke-width="2.5"/>
      <circle cx="30" cy="140" r="13" fill="#333" stroke="#f5c518" stroke-width="1.5"/>
      <rect x="62" y="26" width="136" height="6" rx="3" fill="#f5c518"/>
      <rect x="75" y="20" width="4" height="10" rx="2" fill="#f5c518"/>
      <rect x="100" y="20" width="4" height="10" rx="2" fill="#f5c518"/>
      <rect x="125" y="20" width="4" height="10" rx="2" fill="#f5c518"/>
      <rect x="150" y="20" width="4" height="10" rx="2" fill="#f5c518"/>
      <rect x="175" y="20" width="4" height="10" rx="2" fill="#f5c518"/>
      <line x1="195" y1="26" x2="195" y2="5" stroke="#e8640a" stroke-width="2"/>
      <circle cx="195" cy="4" r="3" fill="#e8640a"/>
      <line x1="170" y1="75" x2="170" y2="135" stroke="#1a3a0a" stroke-width="2"/>
    </svg>
    <div class="title">🚙 JEEP QUIZ</div>
    <div class="subtitle">Lab Legends Edition 🧪</div>
  </div>

  <div class="players">
    <div class="player-badge">🧑 Yiğit</div>
    <div class="player-badge">❄️ Ayaz</div>
    <div class="player-badge">💪 Mehmet Baki</div>
    <div class="player-badge">🧭 Kuzey</div>
    <div class="player-badge">🔬 Zoktay</div>
  </div>

  <div id="gameArea">
    <div class="score-display">
      <span>SCORE</span>
      <span class="score-val" id="scoreVal">0 / 0</span>
      <span>Q <span id="qNum">1</span>/6</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="hint-banner" id="hintBanner"></div>
    <div class="question-card" id="questionCard">
      <div class="question-meta">
        <div class="q-number" id="qNumber">Q1</div>
        <div class="q-character" id="qChar">🧑 Yiğit</div>
      </div>
      <div class="question-text" id="questionText">Loading...</div>
    </div>
    <div class="answers" id="answersDiv"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">NEXT QUESTION 🚙 →</button>
  </div>

  <div class="end-screen" id="endScreen">
    <div class="end-title">GAME OVER!</div>
    <div class="end-score" id="endScore"></div>
    <div class="end-msg" id="endMsg"></div>
    <button class="restart-btn" onclick="restartGame()">PLAY AGAIN! 🔄</button>
  </div>
</div>

<script>
const questions=[
{character:"🧑 Yiğit",text:"Yiğit added something to water and made the GROUNDBREAKING discovery that it now tastes sour. Nobel Prize incoming. What did he add? (bomboş keşif)",answers:[{text:"Salt",speak:"Salt"},{text:"Lemon juice",speak:"Lemon juice"},{text:"Air",speak:"Air"}],correct:1,correctFeedback:"HELAL LAN SANA! 🔥 Lemon juice = sour. Yiğit is basically Einstein now. 🍋",wrongFeedback:"BİR DAHA DENE LAN! 😤 Think sourness, genius!"},
{character:"❄️ Ayaz",text:"Ayaz mixed something with vinegar in his 'lab room' (his bedroom). The reaction foamed so violently his mom used it to clean rust. What did he mix with vinegar?",answers:[{text:"Baking soda",speak:"Baking soda"},{text:"His tears",speak:"His tears"},{text:"Sugar",speak:"Sugar"}],correct:0,correctFeedback:"HELAL LAN SANA! 🔥 Baking soda + vinegar = accidental rust cleaner! Ayaz is a hero! 🫧",wrongFeedback:"BİR DAHA DENE LAN! 😤 What fizzes like crazy with vinegar?"},
{character:"💪 Mehmet Baki",text:"Mehmet Baki does push-ups 5 days a week, 6 sets per day. His muscles are filing a complaint. How many total sets per week?",answers:[{text:"25 sets",speak:"25 sets"},{text:"30 sets",speak:"30 sets"},{text:"11 sets",speak:"11 sets"}],correct:1,correctFeedback:"HELAL LAN SANA! 🔥 5×6=30! Mehmet Baki's arms are crying but he's smiling! 💪",wrongFeedback:"BİR DAHA DENE LAN! 😤 5 days × 6 sets = ?"},
{character:"🧭 Kuzey",text:"Kuzey says his name means NORTH. He says this to everyone. Every day. At least 12 times. Which direction IS north?",answers:[{text:"Toward the South Pole",speak:"South Pole"},{text:"Toward the North Pole",speak:"North Pole"},{text:"Wherever Kuzey is pointing",speak:"Wherever Kuzey points"}],correct:1,correctFeedback:"HELAL LAN SANA! 🔥 North Pole! Kuzey is vindicated AGAIN! 🧭",wrongFeedback:"BİR DAHA DENE LAN! 😤 Kuzey = North. North Pole perhaps?"},
{character:"🔬 Zoktay",text:"Zoktay mixed hydrogen and oxygen. He called it a 'revolutionary discovery'. It was just water. What did he make?",answers:[{text:"CO₂",speak:"Carbon dioxide"},{text:"H₂O — Water",speak:"H2O Water"},{text:"Soup",speak:"Soup"}],correct:1,correctFeedback:"HELAL LAN SANA! 🔥 H₂O! Zoktay reinvented water! 🔬💧",wrongFeedback:"BİR DAHA DENE LAN! 😤 H + O = the thing you drink every day!"},
{character:"🚙 ALL CREW",text:"The Jeep crew drives 40 km to the mud track, then 25 km through the forest screaming out the windows. Total distance?",answers:[{text:"55 km",speak:"55 km"},{text:"65 km",speak:"65 km"},{text:"100 km (felt like it)",speak:"100 km"}],correct:1,correctFeedback:"HELAL LAN SANA! 🔥 40+25=65 km! The Jeep smells like mud now! 🚙🌲",wrongFeedback:"BİR DAHA DENE LAN! 😤 40 + 25 = ?"},
{character:"🧑 Yiğit",text:"Yiğit tasted salt water and concluded: 'It tastes salty.' He wrote this in a notebook. What does salt water taste like, according to Yiğit's 3-month study?",answers:[{text:"Sweet",speak:"Sweet"},{text:"Salty",speak:"Salty"},{text:"Like disappointment",speak:"Like disappointment"}],correct:1,correctFeedback:"HELAL LAN SANA! 🔥 SALTY! Science confirmed! 📓",wrongFeedback:"BİR DAHA DENE LAN! 😤 It's... salt water..."},
{character:"❄️ Ayaz",text:"Ayaz claimed his room is a laboratory. What is a laboratory actually used for?",answers:[{text:"Sleeping and gaming",speak:"Sleeping and gaming"},{text:"Scientific experiments",speak:"Scientific experiments"},{text:"Hiding snacks",speak:"Hiding snacks"}],correct:1,correctFeedback:"HELAL LAN SANA! 🔥 Scientific experiments! Not what Ayaz uses his for though! 😂",wrongFeedback:"BİR DAHA DENE LAN! 😤 Lab = science stuff!"},
{character:"💪 Mehmet Baki",text:"Mehmet Baki can do 30 push-ups in a row. If he does 30 push-ups 3 times a day, how many push-ups total?",answers:[{text:"60",speak:"60"},{text:"90",speak:"90"},{text:"Too many",speak:"Too many"}],correct:1,correctFeedback:"HELAL LAN SANA! 🔥 30×3=90! Mehmet Baki's arms have their own ZIP code! 💪",wrongFeedback:"BİR DAHA DENE LAN! 😤 30 × 3 = ?"},

const wheelSegments=[
  {label:"Mehmet Baki\n30 PUSH-UPS! 💪",color:"#e8640a",emoji:"💪",isPushup:true},
  {label:"KOLAYLAŞTIRMA\nHINT! 💡",color:"#2d5a1b",emoji:"💡",isHint:true},
  {label:"JACKPOT\n+3 BONUS! ⭐",color:"#7b2d8b",emoji:"⭐",isBonus:true}
];

let state={current:0,score:0,total:0,answered:false,hintActive:false,hintTurnsLeft:0,animating:false,spinAngle:0};

function speak(text){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.9;u.pitch=1;window.speechSynthesis.speak(u);}

function renderQuestion(){
  const q=questions[state.current];
  document.getElementById('qNum').textContent=state.current+1;
  document.getElementById('qNumber').textContent='Q'+(state.current+1);
  document.getElementById('qChar').textContent=q.character;
  document.getElementById('questionText').textContent=q.text;
  const fb=document.getElementById('feedback');
  fb.className='feedback';fb.textContent='';
  document.getElementById('nextBtn').style.display='none';
  state.answered=false;
  // Animate card
  const card=document.getElementById('questionCard');
  card.style.animation='none';card.offsetHeight;card.style.animation='cardIn .5s cubic-bezier(.22,1,.36,1) both';
  // Progress
  document.getElementById('progressBar').style.width=(state.current/questions.length*100)+'%';
  document.getElementById('scoreVal').textContent=state.score+' / '+state.total;
  // Hint
  const hb=document.getElementById('hintBanner');
  if(state.hintActive&&state.hintTurnsLeft>0){hb.textContent='💡 KOLAYLAŞTIRMA ACTİF! Yanlış şıklar gizlendi. ('+state.hintTurnsLeft+' tur kaldı)';hb.classList.add('active');}
  else{state.hintActive=false;hb.classList.remove('active');}
  // Answers
  const div=document.getElementById('answersDiv');
  div.innerHTML='';
  const letters=['A','B','C'];
  q.answers.forEach((ans,i)=>{
    if(state.hintActive&&state.hintTurnsLeft>0&&i!==q.correct)return;
    const btn=document.createElement('button');
    btn.className='answer-btn';
    btn.dataset.index=i;
    btn.innerHTML='<span class="letter">'+letters[i]+'</span><span>'+ans.text+'</span><span class="sound-icon" onclick="event.stopPropagation();speak(\''+ans.speak+'\')">🔊</span>';
    btn.onclick=()=>selectAnswer(i);
    div.appendChild(btn);
  });
  setTimeout(()=>speak(q.text),300);
}

function selectAnswer(index){
  if(state.answered)return;
  state.answered=true;state.total++;
  const q=questions[state.current];
  const isCorrect=index===q.correct;
  document.querySelectorAll('.answer-btn').forEach(btn=>{
    btn.disabled=true;
    const bi=parseInt(btn.dataset.index);
    if(bi===q.correct)btn.classList.add('correct');
    else if(bi===index&&!isCorrect)btn.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  if(isCorrect){
    state.score++;
    fb.className='feedback correct';fb.textContent=q.correctFeedback;
    speak('Helal lan sana! Correct!');
    const showWheel=Math.random()<0.5;
    if(showWheel){setTimeout(()=>openWheel(),1300);}
    else{setTimeout(()=>{document.getElementById('nextBtn').style.display='block';},1000);}
  }else{
    fb.className='feedback wrong';fb.textContent=q.wrongFeedback;
    speak('Bir daha dene lan!');
    setTimeout(()=>{document.getElementById('nextBtn').style.display='block';},1000);
  }
  document.getElementById('scoreVal').textContent=state.score+' / '+state.total;
  if(state.hintActive&&state.hintTurnsLeft>0){state.hintTurnsLeft--;if(state.hintTurnsLeft===0)state.hintActive=false;}
}

function nextQuestion(){
  state.current++;
  if(state.current>=questions.length)showEnd();
  else renderQuestion();
}

function openWheel(){
  document.getElementById('wheelOverlay').classList.add('active');
  document.getElementById('wheelResult').classList.remove('active');
  document.getElementById('spinBtn').disabled=false;
  drawWheel(state.spinAngle);
}

function closeWheel(){
  document.getElementById('wheelOverlay').classList.remove('active');
  document.getElementById('nextBtn').style.display='block';
}

function drawWheel(rotation){
  const canvas=document.getElementById('wheelCanvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=cx-10;
  ctx.clearRect(0,0,W,H);
  const segAngle=(2*Math.PI)/wheelSegments.length;
  wheelSegments.forEach((seg,i)=>{
    const s=rotation+i*segAngle-Math.PI/2,e=s+segAngle;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=seg.color;ctx.fill();
    ctx.strokeStyle='#f5c518';ctx.lineWidth=3;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(s+segAngle/2);
    ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 12px Nunito,sans-serif';
    const lines=seg.label.split('\n');
    lines.forEach((line,li)=>{ctx.fillText(line,r-12,(li-(lines.length-1)/2)*15);});
    ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,22,0,2*Math.PI);
  ctx.fillStyle='#f5c518';ctx.fill();
  ctx.strokeStyle='#e8640a';ctx.lineWidth=3;ctx.stroke();
  ctx.font='16px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🚙',cx,cy);
}

function spinWheel(){
  if(state.animating)return;
  state.animating=true;
  document.getElementById('spinBtn').disabled=true;
  const totalSpins=(Math.random()*4+5)*2*Math.PI;
  const duration=3600;const start=performance.now();
  const startAngle=state.spinAngle;
  function animate(now){
    const elapsed=now-start;const t=Math.min(elapsed/duration,1);
    const eased=1-Math.pow(1-t,4);
    const angle=startAngle+totalSpins*eased;
    state.spinAngle=angle;drawWheel(angle);
    if(t<1){requestAnimationFrame(animate);}
    else{
      state.animating=false;
      const segAngle=(2*Math.PI)/wheelSegments.length;
      const norm=((angle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      const pointed=(2*Math.PI-norm)%(2*Math.PI);
      const winner=Math.floor(pointed/segAngle)%wheelSegments.length;
      showWheelResult(winner);
    }
  }
  requestAnimationFrame(animate);
}

function showWheelResult(segIndex){
  const seg=wheelSegments[segIndex];
  const resultEl=document.getElementById('wheelResult');
  const resultText=document.getElementById('wheelResultText');
  let html='';
  if(seg.isPushup){
    html='<span class="pushup-anim">💪</span><br>MEHMEt BAKİ ŞİMDİ<br>30 ŞINAV ÇEKECEK!<br><span style="font-size:.9rem;color:#f5c518">Everyone count along! 🔥</span>';
    speak('Mehmet Baki does 30 push-ups right now! Everyone count!');
  }else if(seg.isHint){
    state.hintActive=true;state.hintTurnsLeft=2;
    html='💡 KOLAYLAŞTIRMA!<br><span style="font-size:1rem">Yanlış şıklar sonraki<br>2 turda GİZLENECEK!</span>';
    speak('Kolaylaştırma! Wrong answers will be hidden for 2 turns!');
  }else if(seg.isBonus){
    state.score+=3;
    document.getElementById('scoreVal').textContent=state.score+' / '+state.total;
    html='⭐ JACKPOT!<br>+3 BONUS PUAN!<br><span style="font-size:1rem">Toplam: '+state.score+' puan!</span>';
    speak('Jackpot! Plus 3 bonus points!');
  }
  resultText.innerHTML=html;
  resultEl.classList.add('active');
}

function showEnd(){
  document.getElementById('gameArea').style.display='none';
  const end=document.getElementById('endScreen');end.classList.add('active');
  const pct=Math.round((state.score/state.total)*100);
  document.getElementById('endScore').textContent='SKOR: '+state.score+' / '+state.total+' ('+pct+'%)';
  let msg;
  if(pct===100)msg='PERFECT! 🏆 Yiğit, Ayaz, Mehmet Baki, Kuzey ve Zoktay hepsi seni tebrik ediyor! 🎉';
  else if(pct>=80)msg='HARIKA! 🔥 Jeep crew sana selam yolluyor! 🚙💨';
  else if(pct>=60)msg='FENA DEĞİL! 😄 Zoktay diyor ki biraz daha laboratuvar çalışması lazım! 🧪';
  else if(pct>=40)msg='Ayaz\'ın deneyleri cevaplarından daha başarılıydı! 😂 Tekrar dene!';
  else msg='Mehmet Baki\'nin şınavları kadar yok doğru cevabın! 💪 Hadi tekrar!';
  document.getElementById('endMsg').textContent=msg;
  document.getElementById('progressBar').style.width='100%';
  speak('Game over! Score: '+state.score+' out of '+state.total);
}

function restartGame(){
  state={current:0,score:0,total:0,answered:false,hintActive:false,hintTurnsLeft:0,animating:false,spinAngle:0};
  document.getElementById('endScreen').classList.remove('active');
  document.getElementById('gameArea').style.display='block';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
